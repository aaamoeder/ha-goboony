<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d92465;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b01d53;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Motorhome side view - matching banner design -->
  <g transform="translate(128,122)">
    <!-- Living area body (tall rear section) -->
    <path d="M-68,-58 L-68,16 L68,16 L68,-20 L24,-20 L24,-58 Z" fill="rgba(255,255,255,0.18)" stroke="#fff" stroke-width="4.5" stroke-linejoin="round"/>
    <!-- Cab windshield (angled) -->
    <path d="M44,-20 L68,-20 L68,2 L38,2 L38,-20 Z" fill="rgba(255,255,255,0.28)" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
    <!-- Alcove overhang above cab -->
    <path d="M24,-58 L68,-58 L68,-20 L24,-20 Z" fill="rgba(255,255,255,0.12)" stroke="#fff" stroke-width="4.5" stroke-linejoin="round"/>
    <!-- Living area window 1 -->
    <rect x="-56" y="-24" width="26" height="20" rx="3" fill="rgba(255,255,255,0.3)" stroke="#fff" stroke-width="2.5"/>
    <!-- Living area window 2 -->
    <rect x="-22" y="-24" width="26" height="20" rx="3" fill="rgba(255,255,255,0.3)" stroke="#fff" stroke-width="2.5"/>
    <!-- Cab side window -->
    <rect x="28" y="-16" width="18" height="12" rx="2" fill="rgba(255,255,255,0.3)" stroke="#fff" stroke-width="2.5"/>
    <!-- Entry door -->
    <rect x="8" y="-18" width="12" height="32" rx="2" fill="rgba(255,255,255,0.15)" stroke="#fff" stroke-width="2.5"/>
    <circle cx="17" cy="0" r="2" fill="#fff" stroke="none"/>
    <!-- Stripe -->
    <line x1="-68" y1="4" x2="68" y2="4" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
    <!-- Headlight -->
    <rect x="66" y="-6" width="5" height="9" rx="2" fill="#FFD700" stroke="none"/>
    <!-- Rear light -->
    <rect x="-71" y="-6" width="4" height="9" rx="1.5" fill="#FF6B6B" stroke="none"/>
    <!-- Rear wheel -->
    <circle cx="-38" cy="16" r="17" fill="#fff" stroke="none"/>
    <circle cx="-38" cy="16" r="7.5" fill="url(#bg)" stroke="none"/>
    <circle cx="-38" cy="16" r="2.5" fill="#fff" stroke="none"/>
    <!-- Front wheel -->
    <circle cx="50" cy="16" r="17" fill="#fff" stroke="none"/>
    <circle cx="50" cy="16" r="7.5" fill="url(#bg)" stroke="none"/>
    <circle cx="50" cy="16" r="2.5" fill="#fff" stroke="none"/>
    <!-- Roof AC unit -->
    <rect x="-46" y="-64" width="36" height="6" rx="3" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Euro coin badge -->
  <g transform="translate(205,52)">
    <circle cx="0" cy="0" r="24" fill="#fff" stroke="none"/>
    <circle cx="0" cy="0" r="20" fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/>
    <text x="0" y="7" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="700" fill="#b01d53" text-anchor="middle">€</text>
  </g>
</svg>
