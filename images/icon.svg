<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d92465;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b01d53;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Campervan body -->
  <g transform="translate(128,120)" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main body -->
    <rect x="-72" y="-20" width="144" height="56" rx="8" fill="rgba(255,255,255,0.15)" stroke="#fff"/>
    <!-- Cabin top -->
    <path d="M-72,-20 L-72,-44 C-72,-52 -66,-58 -58,-58 L10,-58 L40,-20" fill="rgba(255,255,255,0.15)" stroke="#fff"/>
    <!-- Window -->
    <rect x="-56" y="-50" width="28" height="22" rx="4" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="4"/>
    <!-- Side window -->
    <rect x="-16" y="-50" width="20" height="22" rx="4" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="4"/>
    <!-- Door window on camper part -->
    <rect x="50" y="-10" width="16" height="18" rx="3" fill="rgba(255,255,255,0.25)" stroke="#fff" stroke-width="4"/>
    <!-- Wheels -->
    <circle cx="-42" cy="36" r="16" fill="#fff" stroke="#fff" stroke-width="2"/>
    <circle cx="-42" cy="36" r="7" fill="url(#bg)" stroke="none"/>
    <circle cx="48" cy="36" r="16" fill="#fff" stroke="#fff" stroke-width="2"/>
    <circle cx="48" cy="36" r="7" fill="url(#bg)" stroke="none"/>
    <!-- Bumper line -->
    <line x1="-72" y1="36" x2="-58" y2="36" stroke="#fff" stroke-width="4"/>
    <line x1="64" y1="36" x2="72" y2="36" stroke="#fff" stroke-width="4"/>
  </g>
  <!-- HA-style home icon hint -->
  <g transform="translate(200,48)">
    <circle cx="0" cy="0" r="22" fill="rgba(255,255,255,0.2)"/>
    <path d="M0,-12 L-14,0 L-10,0 L-10,10 L-4,10 L-4,4 L4,4 L4,10 L10,10 L10,0 L14,0 Z" fill="#fff" stroke="none"/>
  </g>
</svg>
